# ollama — Local LLM inference server
# Project name: ollama  (managed by start.sh / stop.sh)
#
# Exposes:
#   11434/tcp — Ollama REST API (model inference and management)
#
# ⚠ REQUIRES the NVIDIA Container Toolkit on the host before running.
#   See ai/README.md for the prerequisite installation link.
#
# API: http://localhost:11434

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    env_file: .env
    volumes:
      - ${OLLAMA_DATA_PATH:-./data/models}:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-0.0.0.0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
