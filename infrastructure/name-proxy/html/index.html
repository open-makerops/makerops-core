<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MakerOps Core</title>
  <link rel="icon" type="image/png" href="/assets/images/makerops-core-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:          #0f1923;
      --color-surface:     #1a2332;
      --color-surface-alt: #1f2d40;
      --color-border:      #2a3f58;
      --color-accent:      #f07820;
      --color-text:        #e8edf2;
      --color-text-muted:  #7a9ab8;
      --color-text-link:   #5ba8d4;
      --radius:            6px;
      --font-body: system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", "Courier New", monospace;
    }

    html { font-size: 16px; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    header {
      background-image: url("/assets/images/makerops-core-hero.png");
      background-size: cover;
      background-position: center top;
      padding: 3rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      box-shadow: inset 0 0 0 9999px rgba(15, 25, 35, 0.65);
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 14px;
      flex-shrink: 0;
      box-shadow: 0 0 24px rgba(240, 120, 32, 0.35);
    }

    .header-text h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--color-text);
    }

    .tagline {
      margin-top: 0.25rem;
      color: var(--color-text-muted);
      font-size: 1rem;
    }

    /* ── Main content ────────────────────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* ── Category sections ───────────────────────────────────────────────────── */
    .category {
      margin-bottom: 2.25rem;
    }

    .category h2 {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-accent);
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 0.25rem;
    }

    /* ── Service list ────────────────────────────────────────────────────────── */
    .service-list {
      list-style: none;
    }

    .service-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.75rem;
      border-radius: var(--radius);
      transition: background 0.12s;
    }

    .service-row:hover {
      background: var(--color-surface-alt);
    }

    .service-link {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      text-decoration: none;
      color: inherit;
      min-width: 0;
    }

    .service-link:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
      border-radius: var(--radius);
    }

    /* Letter badge */
    .badge {
      width: 2.1rem;
      height: 2.1rem;
      border-radius: 50%;
      background: var(--color-accent);
      color: #0f1923;
      font-weight: 800;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: var(--font-mono);
      user-select: none;
    }

    /* Muted badge for no-UI services */
    .no-ui .badge {
      background: var(--color-surface);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }

    .service-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--color-text);
      white-space: nowrap;
      min-width: 9rem;
    }

    .service-desc {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* README pill */
    .readme-link {
      font-size: 0.72rem;
      font-family: var(--font-mono);
      padding: 0.2rem 0.6rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      color: var(--color-text-muted);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.12s, color 0.12s;
    }

    .readme-link:hover,
    .readme-link:focus-visible {
      border-color: var(--color-accent);
      color: var(--color-accent);
      outline: none;
    }

    /* ── Footer ──────────────────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--color-border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      color: var(--color-text-muted);
      font-size: 0.82rem;
    }

    .footer-icon {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    .footer-links {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    footer a {
      color: var(--color-text-link);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--color-accent);
    }

    .footer-sep {
      color: var(--color-border);
      user-select: none;
    }

    /* ── Responsive ──────────────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      header { padding: 2rem 1.25rem; }
      .logo { width: 56px; height: 56px; }
      .header-text h1 { font-size: 1.5rem; }
      main { padding: 1.5rem 1rem; }
      .service-desc { display: none; }
    }
  </style>
</head>
<body>

<header>
  <img class="logo" src="/assets/images/makerops-core-icon.png" alt="MakerOps Core">
  <div class="header-text">
    <h1>MakerOps Core</h1>
    <p class="tagline">Self-hosted services for manufacturing operations</p>
  </div>
</header>

<main id="service-list">
  <!-- Rendered by JS -->
</main>

<footer>
  <img class="footer-icon" src="/assets/images/makerops-core-icon.png" alt="">
  <div class="footer-links">
    <span>makerops-labs/makerops-core</span>
    <span class="footer-sep">·</span>
    <a href="https://github.com/makerops-labs/makerops-core/blob/main/README.md"
       target="_blank" rel="noopener noreferrer">README</a>
    <span class="footer-sep">·</span>
    <a href="https://github.com/makerops-labs/makerops-core"
       target="_blank" rel="noopener noreferrer">GitHub ↗</a>
  </div>
</footer>

<script>
  const GITHUB_BASE = "https://github.com/makerops-labs/makerops-core/blob/main/";
  const CAT_ORDER = ["Shared", "Accounting", "Sales", "Operations", "AI", "Remote Access", "Infrastructure"];

  const SERVICES = [
    { cat: "Shared",         name: "n8n",            desc: "Workflow Automation",         sub: "n8n",          readme: "shared/n8n/README.md" },
    { cat: "Shared",         name: "Outline",         desc: "Knowledge Base",              sub: "outline",      readme: "shared/outline/README.md" },
    { cat: "Shared",         name: "Plane",           desc: "Project Management",          sub: "plane",        readme: "shared/plane/README.md" },
    { cat: "Shared",         name: "trigger.dev",     desc: "Background Jobs",             sub: "trigger",      readme: "shared/triggerdev/README.md" },
    { cat: "Accounting",     name: "Invoice Ninja",   desc: "Accounting & Invoicing",      sub: "invoiceninja", readme: "accounting/invoiceninja/README.md" },
    { cat: "Sales",          name: "FreeScout",       desc: "Help Desk",                   sub: "freescout",    readme: "sales/freescout/README.md" },
    { cat: "Operations",     name: "InvenTree",       desc: "Inventory Management",        sub: "inventree",    readme: "operations/inventree/README.md" },
    { cat: "AI",             name: "Ollama",          desc: "LLM Inference API",           sub: "ollama",       readme: "ai/ollama/README.md" },
    { cat: "AI",             name: "ComfyUI",         desc: "Image Generation",            sub: "comfyui",      readme: "ai/comfyui/README.md" },
    { cat: "Remote Access",  name: "WireGuard",       desc: "VPN Management",              sub: "wg",           readme: "remote_access/wg-easy/README.md" },
    { cat: "Remote Access",  name: "Cloudflare DDNS", desc: "Dynamic DNS",                 sub: "",             readme: "remote_access/cloudflare-ddns/README.md" },
    { cat: "Infrastructure", name: "Garage",          desc: "S3-Compatible Object Store",  sub: "",             readme: "infrastructure/garage/README.md" },
    { cat: "Infrastructure", name: "LAN DNS",         desc: "Local Domain Name Server",    sub: "",             readme: "infrastructure/lan-dns/README.md" },
    { cat: "Infrastructure", name: "name-proxy",      desc: "Subdomain Reverse Proxy",     sub: "",             readme: "infrastructure/name-proxy/README.md" },
  ];

  function getParentDomain() {
    const host = window.location.hostname;
    const dot = host.indexOf(".");
    return dot === -1 ? host : host.slice(dot + 1);
  }

  function esc(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function render() {
    const parent = getParentDomain();
    const byCategory = {};
    SERVICES.forEach(s => { (byCategory[s.cat] = byCategory[s.cat] || []).push(s); });

    const main = document.getElementById("service-list");

    CAT_ORDER.forEach(cat => {
      if (!byCategory[cat]) return;

      const section = document.createElement("section");
      section.className = "category";
      section.innerHTML = `<h2>${esc(cat)}</h2>`;

      const ul = document.createElement("ul");
      ul.className = "service-list";

      byCategory[cat].forEach(svc => {
        const readmeUrl = GITHUB_BASE + svc.readme;
        const hasUi = Boolean(svc.sub);
        const serviceUrl = hasUi ? `http://${svc.sub}.${parent}` : readmeUrl;
        const newTab = !hasUi ? ' target="_blank" rel="noopener noreferrer"' : '';
        const badge = svc.name[0].toUpperCase();

        const li = document.createElement("li");
        li.className = "service-row" + (hasUi ? "" : " no-ui");
        li.innerHTML = `
          <a class="service-link" href="${esc(serviceUrl)}"${newTab}>
            <span class="badge">${esc(badge)}</span>
            <span class="service-name">${esc(svc.name)}</span>
            <span class="service-desc">${esc(svc.desc)}</span>
          </a>
          <a class="readme-link"
             href="${esc(readmeUrl)}"
             target="_blank" rel="noopener noreferrer">README</a>
        `;
        ul.appendChild(li);
      });

      section.appendChild(ul);
      main.appendChild(section);
    });
  }

  document.addEventListener("DOMContentLoaded", render);
</script>

</body>
</html>
