# InvenTree — Inventory & Parts Management
# Project name: inventree  (managed by start.sh / stop.sh)
#
# Services:
#   inventree-db      — PostgreSQL 17 (application database)
#   inventree-cache   — Redis 7 (cache layer)
#   inventree-server  — Gunicorn/Django application server (internal)
#   inventree-worker  — Django-Q background task worker
#   inventree-proxy   — Caddy reverse proxy; host port 8096
#
# On first start, inventree-server automatically runs database migrations and
# creates the admin account (INVENTREE_AUTO_UPDATE=True).  secret_key.txt is
# auto-generated in the data volume if absent.
# Caddy serves static and media files directly from the shared data volume,
# proxying all other requests to the application server.

networks:
  inventree:

services:

  # ── Database ───────────────────────────────────────────────────────────────────
  inventree-db:
    image: postgres:17-alpine
    container_name: inventree_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${INVENTREE_DB_NAME:-inventree}
      POSTGRES_USER: ${INVENTREE_DB_USER:-inventree}
      POSTGRES_PASSWORD: "${INVENTREE_DB_PASSWORD}"
    volumes:
      - ${INVENTREE_DB_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    networks:
      - inventree
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INVENTREE_DB_USER:-inventree} -d ${INVENTREE_DB_NAME:-inventree}"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Cache ──────────────────────────────────────────────────────────────────────
  inventree-cache:
    image: redis:7-alpine
    container_name: inventree_cache
    restart: unless-stopped
    volumes:
      - ${INVENTREE_CACHE_DATA_PATH:-./data/redis}:/data
    networks:
      - inventree
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Application server ─────────────────────────────────────────────────────────
  inventree-server:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    pull_policy: if_not_present
    container_name: inventree_server
    restart: unless-stopped
    env_file: ./.env
    environment:
      INVENTREE_WEB_PORT: "8000"
    volumes:
      - ${INVENTREE_APP_DATA_PATH:-./data/inventree}:/home/inventree/data
      - ./spa_helper.py:/home/inventree/src/backend/InvenTree/web/templatetags/spa_helper.py:ro
    networks:
      - inventree
    depends_on:
      inventree-db:
        condition: service_healthy
      inventree-cache:
        condition: service_healthy

  # ── Background worker ──────────────────────────────────────────────────────────
  inventree-worker:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    pull_policy: if_not_present
    container_name: inventree_worker
    command: invoke worker
    restart: unless-stopped
    env_file: ./.env
    environment:
      INVENTREE_WEB_PORT: "8000"
    volumes:
      - ${INVENTREE_APP_DATA_PATH:-./data/inventree}:/home/inventree/data
    networks:
      - inventree
    depends_on:
      - inventree-server

  # ── Reverse proxy — host port 8096 ────────────────────────────────────────────
  inventree-proxy:
    image: caddy:2-alpine
    container_name: inventree_proxy
    restart: unless-stopped
    environment:
      INVENTREE_SERVER_ADDR: http://inventree-server:8000
      INVENTREE_CANONICAL_HOST: "${INVENTREE_CANONICAL_HOST:-inventree.localhost}"
    ports:
      - "${INVENTREE_WEB_PORT:-8096}:8096"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${INVENTREE_APP_DATA_PATH:-./data/inventree}:/var/www:ro
    networks:
      - inventree
    depends_on:
      - inventree-server
